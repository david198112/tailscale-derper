name: Build & Push derper

on:
  workflow_dispatch:
    inputs:
      ts_version:
        description: 'Tailscale version (e.g. v1.90.6)'
        required: true
        default: 'v1.90.6'
  schedule:
    - cron: '0 18 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/derper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 解析版本
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TS_VER="${{ github.event.inputs.ts_version }}"
          else
            TS_VER="v1.90.6"
          fi
          echo "ts_ver=${TS_VER}" >> $GITHUB_OUTPUT
          echo "img_tag=${TS_VER}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.derper
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.img_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            TS_VERSION=${{ steps.ver.outputs.ts_ver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max